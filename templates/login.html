<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #3b82f6;
            --primary-blue-dark: #2563eb;
            --secondary-purple: #8b5cf6;
            --accent-teal: #06b6d4;
            --soft-gray: #f8fafc;
            --warm-gray: #64748b;
            --light-gray: #e2e8f0;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, 
                rgba(59, 130, 246, 0.1) 0%, 
                rgba(139, 92, 246, 0.1) 25%,
                rgba(6, 182, 212, 0.1) 50%,
                rgba(59, 130, 246, 0.1) 75%,
                rgba(139, 92, 246, 0.1) 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .floating-animation {
            animation: float 8s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(1deg); }
            50% { transform: translateY(-20px) rotate(0deg); }
            75% { transform: translateY(-10px) rotate(-1deg); }
        }
        
        .pulse-animation {
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        .input-focus {
            transition: all 0.3s ease;
        }
        
        .input-focus:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.2);
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-purple) 100%);
            transition: all 0.3s ease;
        }
        
        .btn-gradient:hover {
            background: linear-gradient(135deg, var(--primary-blue-dark) 0%, var(--secondary-purple) 100%);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <div class="login-container relative">
        <!-- Decorative Elements -->
        <div class="absolute top-10 left-10 w-20 h-20 bg-blue-400 bg-opacity-20 rounded-full blur-xl animate-pulse"></div>
        <div class="absolute top-32 right-16 w-16 h-16 bg-purple-400 bg-opacity-20 rounded-full blur-lg animate-pulse" style="animation-delay: 1s;"></div>
        <div class="absolute bottom-20 left-20 w-24 h-24 bg-teal-400 bg-opacity-20 rounded-full blur-xl animate-pulse" style="animation-delay: 2s;"></div>
        
        <div class="glass-effect rounded-3xl p-10 w-full max-w-lg mx-4 floating-animation relative z-10">
            <!-- Logo -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mb-6 pulse-animation shadow-2xl">
                    <i class="fas fa-robot text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-3">TeleTowa</h1>
                <p class="text-gray-600 text-lg">Multi-Platform Chat Manager</p>
                <div class="w-16 h-1 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full mx-auto mt-4"></div>
            </div>

            <!-- Login Form -->
            <form method="POST" class="space-y-8">
                <div class="space-y-6">
                    <div>
                        <label for="username" class="block text-sm font-semibold text-gray-700 mb-3">
                            <i class="fas fa-user mr-2 text-blue-500"></i>Username
                        </label>
                        <input type="text" id="username" name="username" required
                               class="input-focus w-full px-5 py-4 bg-white border-2 border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="Enter your username">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-semibold text-gray-700 mb-3">
                            <i class="fas fa-lock mr-2 text-purple-500"></i>Password
                        </label>
                        <input type="password" id="password" name="password" required
                               class="input-focus w-full px-5 py-4 bg-white border-2 border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                               placeholder="Enter your password">
                    </div>
                </div>

                <button type="submit"
                        class="btn-gradient w-full text-white font-bold py-4 px-6 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-300 focus:ring-opacity-50 shadow-xl">
                    <i class="fas fa-sign-in-alt mr-3"></i>Sign In to Dashboard
                </button>
            </form>

            <!-- Error Message -->
            {{if .Error}}
            <div class="mt-6 p-4 bg-red-50 border-2 border-red-200 rounded-xl">
                <p class="text-red-600 text-sm text-center font-medium">
                    <i class="fas fa-exclamation-triangle mr-2"></i>{{.Error}}
                </p>
            </div>
            {{end}}
            
            <!-- Additional Info -->
            <div class="mt-8 text-center">
                <p class="text-gray-500 text-sm">
                    <i class="fas fa-shield-alt mr-2"></i>Secure authentication powered by modern encryption
                </p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="fixed bottom-6 left-0 right-0 text-center z-10">
        <div class="inline-flex items-center px-6 py-3 bg-white bg-opacity-80 backdrop-blur-sm rounded-full shadow-lg">
            <i class="fas fa-copyright mr-2 text-gray-600"></i>
            <span class="text-gray-700 font-medium">2024 TeleTowa</span>
            <span class="mx-2 text-gray-400">•</span>
            <span class="text-gray-600">Secure Chat Management</span>
        </div>
    </div>



    <script>
        // Focus on username field when page loads
        window.addEventListener('load', function() {
            document.getElementById('username').focus();
        });

        // Add some interactive effects
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('transform', 'scale-105');
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('transform', 'scale-105');
            });
        });
    </script>
</body>
</html>
